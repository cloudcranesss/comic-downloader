services:
  comic-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-downloader
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      TOONILY_REDIS_URL: redis://redis:6379/0
      TOONILY_REDIS_USERNAME: ""
      TOONILY_REDIS_PASSWORD: ""
      JM_USERNAME: ""
      JM_PASSWORD: ""
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: comic-downloader-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

