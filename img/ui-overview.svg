  <rect x="632" y="238" width="170" height="62" rx="12" fill="#1570EF"/>
  <text x="680" y="278" fill="#FFFFFF" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Search</text>

  <rect x="28" y="360" width="598" height="332" rx="16" fill="url(#card)" stroke="#2A4B78"/>
  <text x="52" y="406" fill="#EAF2FF" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Bookshelf</text>
  <rect x="52" y="426" width="170" height="240" rx="12" fill="#112747" stroke="#345783"/>
  <rect x="242" y="426" width="170" height="240" rx="12" fill="#112747" stroke="#345783"/>
