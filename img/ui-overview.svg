  <text x="52" y="208" fill="#AFC8F2" font-size="22" font-family="Segoe UI, Arial, sans-serif">Search by keyword or paste a series URL</text>

  <rect x="52" y="238" width="560" height="62" rx="12" fill="#0B1A33" stroke="#355A8E"/>
