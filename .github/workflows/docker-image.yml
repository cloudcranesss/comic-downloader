name: Build And Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/cloudcranesss/comic-downloader

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate archive version
        id: version
        run: |
          VERSION="$(date -u +'%Y%m%d%H%M%S')"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "archive_tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive previous latest image
        shell: bash
        run: |
          set -euo pipefail
          LATEST_REF="${IMAGE_NAME}:latest"
          ARCHIVE_REF="${IMAGE_NAME}:${{ steps.version.outputs.archive_tag }}"
          if docker buildx imagetools inspect "${LATEST_REF}" >/dev/null 2>&1; then
            echo "Found previous latest: ${LATEST_REF}"
            docker buildx imagetools create --tag "${ARCHIVE_REF}" "${LATEST_REF}"
            echo "Archived previous latest as ${ARCHIVE_REF}"
          else
            echo "No previous latest image found, skip archiving."
          fi

      - name: Docker metadata (latest only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
